  <text x="290" y="370" text-anchor="middle" class="label">In correct group for</text>
  <text x="290" y="386" text-anchor="middle" class="label">profile assignment?</text>
  <text x="290" y="402" text-anchor="middle" class="sub">PRD3</text>
  <rect x="50" y="470" width="230" height="60" rx="8" ry="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="165" y="490" text-anchor="middle" class="label">Add device to</text>
  <text x="165" y="506" text-anchor="middle" class="label">correct group</text>
  <text x="165" y="522" text-anchor="middle" class="sub">PRA1</text>
  <path d="M 240,425 L 165,470" stroke="#3b82f6" stroke-width="1.5" fill="none" marker-end="url(#arr-blue)"/>
  <rect x="186" y="437" width="28" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="200" y="447" text-anchor="middle" class="edge">No</text>
  <polygon points="170,560 280,600 170,640 60,600" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="170" y="590" text-anchor="middle" class="label">Wait 30 min — profile</text>
  <text x="170" y="606" text-anchor="middle" class="label">now assigned?</text>
  <text x="170" y="622" text-anchor="middle" class="sub">PRD4</text>
  <path d="M 165,530 L 165,560" stroke="#3b82f6" stroke-width="1.5" fill="none" marker-end="url(#arr-blue)"/>
  <rect x="20" y="690" width="165" height="50" rx="8" ry="8" fill="#052e16" stroke="#10b981" stroke-width="1.5"/>
