<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 1000" width="1100" height="1000">
  <style>
    text { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace; fill: #e2e8f0; letter-spacing: 0.02em; }
    .title { font-size: 18px; font-weight: 700; fill: #e2e8f0; letter-spacing: 0.02em; }
    .subtitle { font-size: 12px; fill: #94a3b8; }
    .label { font-size: 13px; fill: #e2e8f0; }
    .sub { font-size: 11px; fill: #94a3b8; }
    .edge { font-size: 11px; fill: #cbd5e1; font-weight: 700; }
    .col-head { font-size: 13px; font-weight: 700; fill: #cbd5e1; letter-spacing: 0.08em; }
    .legend { font-size: 11px; fill: #94a3b8; }
  </style>
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#3b82f6"/>
    </marker>
    <marker id="arr-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#ef4444"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#10b981"/>
    </marker>
    <marker id="arr-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#f97316"/>
    </marker>
    <marker id="arr-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#a855f7"/>
    </marker>
    <marker id="arr-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1100" height="1000" fill="url(#bg-grad)"/>
  <text x="550" y="36" text-anchor="middle" class="title">Profile Assignment Decision Tree</text>
  <text x="550" y="58" text-anchor="middle" class="subtitle">APv1 · Profile not assigned or wrong profile  ·  docs/decision-trees/02-profile-assignment.md</text>
  <polygon points="550,80 675,120 550,160 425,120" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="550" y="110" text-anchor="middle" class="label">Device registered</text>
  <text x="550" y="126" text-anchor="middle" class="label">in Autopilot portal?</text>
  <text x="550" y="142" text-anchor="middle" class="sub">PRD1</text>
  <rect x="50" y="100" width="230" height="50" rx="8" ry="8" fill="#052e16" stroke="#10b981" stroke-width="1.5"/>
  <text x="165" y="123" text-anchor="middle" class="label">Return to Initial Triage</text>
  <text x="165" y="139" text-anchor="middle" class="sub">PRR0</text>
  <path d="M 425,120 L 280,120" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arr-green)"/>
  <rect x="341" y="103" width="28" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="355" y="113" text-anchor="middle" class="edge">No</text>
  <path d="M 550,160 L 550,205" stroke="#3b82f6" stroke-width="1.5" fill="none" marker-end="url(#arr-blue)"/>
  <rect x="561" y="182" width="28" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="575" y="192" text-anchor="middle" class="edge">Yes</text>
  <polygon points="550,210 675,250 550,290 425,250" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="550" y="240" text-anchor="middle" class="label">Profile assigned</text>
  <text x="550" y="256" text-anchor="middle" class="label">to device?</text>
  <text x="550" y="272" text-anchor="middle" class="sub">PRD2</text>
  <path d="M 425,250 L 290,250 L 290,330" stroke="#3b82f6" stroke-width="1.5" fill="none" marker-end="url(#arr-blue)"/>
  <rect x="341" y="234" width="28" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="355" y="244" text-anchor="middle" class="edge">No</text>
