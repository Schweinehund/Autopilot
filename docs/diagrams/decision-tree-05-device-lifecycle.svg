<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 900" width="1500" height="900">
  <style>
    text { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace; fill: #e2e8f0; letter-spacing: 0.02em; }
    .title { font-size: 18px; font-weight: 700; fill: #e2e8f0; letter-spacing: 0.02em; }
    .subtitle { font-size: 12px; fill: #94a3b8; }
    .label { font-size: 13px; fill: #e2e8f0; }
    .sub { font-size: 11px; fill: #94a3b8; }
    .edge { font-size: 11px; fill: #cbd5e1; font-weight: 700; }
    .col-head { font-size: 13px; font-weight: 700; fill: #cbd5e1; letter-spacing: 0.08em; }
    .legend { font-size: 11px; fill: #94a3b8; }
  </style>
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#3b82f6"/>
    </marker>
    <marker id="arr-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#ef4444"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#10b981"/>
    </marker>
    <marker id="arr-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#f97316"/>
    </marker>
    <marker id="arr-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#a855f7"/>
    </marker>
    <marker id="arr-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1500" height="900" fill="url(#bg-grad)"/>
  <text x="750" y="36" text-anchor="middle" class="title">Device Lifecycle Decision Tree</text>
  <text x="750" y="58" text-anchor="middle" class="subtitle">What do you want to preserve?  ·  docs/decision-trees/05-device-lifecycle.md</text>
  <polygon points="750,90 920,140 750,190 580,140" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="750" y="130" text-anchor="middle" class="label">User&#x27;s personal data</text>
  <text x="750" y="146" text-anchor="middle" class="label">(files, photos, apps)?</text>
  <text x="750" y="162" text-anchor="middle" class="sub">Q1</text>
  <rect x="40" y="105" width="280" height="80" rx="8" ry="8" fill="#052e16" stroke="#10b981" stroke-width="1.5"/>
  <text x="180" y="136" text-anchor="middle" class="label">Retire</text>
  <text x="180" y="152" text-anchor="middle" class="sub">Removes org data only</text>
  <text x="180" y="165" text-anchor="middle" class="sub">See: 02-retire-wipe.md</text>
  <path d="M 580,140 L 320,140" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arr-green)"/>
  <rect x="409" y="123" width="113" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="465" y="133" text-anchor="middle" class="edge">Yes — remove org only</text>
  <polygon points="750,240 920,290 750,340 580,290" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="750" y="280" text-anchor="middle" class="label">Org enrollment + settings</text>
  <text x="750" y="296" text-anchor="middle" class="label">(re-use for next user)?</text>
  <text x="750" y="312" text-anchor="middle" class="sub">Q2</text>
  <path d="M 750,190 L 750,240" stroke="#3b82f6" stroke-width="1.5" fill="none" marker-end="url(#arr-blue)"/>
  <rect x="761" y="218" width="28" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="775" y="228" text-anchor="middle" class="edge">No</text>
  <polygon points="320,410 460,460 320,510 180,460" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="320" y="450" text-anchor="middle" class="label">Keep user documents</text>
  <text x="320" y="466" text-anchor="middle" class="label">(Home folder)?</text>
  <text x="320" y="482" text-anchor="middle" class="sub">Q4</text>
  <polygon points="1180,410 1320,460 1180,510 1040,460" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="1180" y="458" text-anchor="middle" class="label">Same tenant?</text>
  <text x="1180" y="474" text-anchor="middle" class="sub">Q3</text>
  <path d="M 670,340 L 670,380 L 320,380 L 320,410" stroke="#3b82f6" stroke-width="1.5" fill="none" marker-end="url(#arr-blue)"/>
  <rect x="526" y="362" width="28" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="540" y="372" text-anchor="middle" class="edge">No</text>
  <path d="M 830,340 L 830,380 L 1180,380 L 1180,410" stroke="#3b82f6" stroke-width="1.5" fill="none" marker-end="url(#arr-blue)"/>
  <rect x="936" y="362" width="28" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="950" y="372" text-anchor="middle" class="edge">Yes</text>
  <rect x="40" y="600" width="280" height="130" rx="8" ry="8" fill="#052e16" stroke="#10b981" stroke-width="1.5"/>
  <text x="180" y="656" text-anchor="middle" class="label">Fresh Start</text>
  <text x="180" y="672" text-anchor="middle" class="sub">Removes OEM bloatware</text>
  <text x="180" y="685" text-anchor="middle" class="sub">Keeps user documents</text>
  <rect x="360" y="600" width="280" height="130" rx="8" ry="8" fill="#450a0a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="500" y="656" text-anchor="middle" class="label">Wipe</text>
  <text x="500" y="672" text-anchor="middle" class="sub">Factory reset — erases all</text>
  <text x="500" y="685" text-anchor="middle" class="sub">Lost/stolen / hybrid</text>
  <path d="M 250,510 L 180,600" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arr-green)"/>
  <rect x="139" y="572" width="83" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="180" y="582" text-anchor="middle" class="edge">Yes — keep docs</text>
  <path d="M 390,510 L 500,600" stroke="#ef4444" stroke-width="1.5" fill="none" marker-end="url(#arr-red)"/>
  <rect x="501" y="572" width="78" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="540" y="582" text-anchor="middle" class="edge">No — erase all</text>
  <rect x="880" y="600" width="280" height="130" rx="8" ry="8" fill="#052e16" stroke="#10b981" stroke-width="1.5"/>
  <text x="1020" y="656" text-anchor="middle" class="label">Autopilot Reset</text>
  <text x="1020" y="672" text-anchor="middle" class="sub">APv1 only · keeps org config</text>
  <text x="1020" y="685" text-anchor="middle" class="sub">See: 01-autopilot-reset.md</text>
  <rect x="1200" y="600" width="280" height="130" rx="8" ry="8" fill="#1c1917" stroke="#f97316" stroke-width="1.5"/>
  <text x="1340" y="656" text-anchor="middle" class="label">Tenant Migration</text>
  <text x="1340" y="672" text-anchor="middle" class="sub">Deregister Tenant A,</text>
  <text x="1340" y="685" text-anchor="middle" class="sub">re-import to Tenant B</text>
  <path d="M 1110,510 L 1020,600" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arr-green)"/>
  <rect x="996" y="572" width="28" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="1010" y="582" text-anchor="middle" class="edge">Yes</text>
  <path d="M 1250,510 L 1340,600" stroke="#f97316" stroke-width="1.5" fill="none" marker-end="url(#arr-orange)"/>
  <rect x="1334" y="572" width="113" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="1390" y="582" text-anchor="middle" class="edge">No — different tenant</text>
  <rect x="30" y="865" width="14" height="14" rx="3" ry="3" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="52" y="876" class="legend">Decision</text>
  <rect x="118" y="865" width="14" height="14" rx="3" ry="3" fill="#052e16" stroke="#10b981" stroke-width="1.2"/>
  <text x="140" y="876" class="legend">Action (preserve data)</text>
  <rect x="290" y="865" width="14" height="14" rx="3" ry="3" fill="#450a0a" stroke="#ef4444" stroke-width="1.2"/>
  <text x="312" y="876" class="legend">Wipe (data loss)</text>
  <rect x="426" y="865" width="14" height="14" rx="3" ry="3" fill="#1c1917" stroke="#f97316" stroke-width="1.2"/>
  <text x="448" y="876" class="legend">Cross-tenant operation</text>
  <text x="1480" y="892" text-anchor="end" class="legend">docs/diagrams/decision-tree-05-device-lifecycle.svg</text>
</svg>
