<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 950" width="1300" height="950">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
    .title { font-size: 18px; font-weight: 600; fill: #111827; }
    .subtitle { font-size: 12px; fill: #6b7280; }
    .label { font-size: 13px; fill: #111827; }
    .sub { font-size: 11px; fill: #6b7280; }
    .edge { font-size: 11px; fill: #374151; font-weight: 600; }
    .col-head { font-size: 13px; font-weight: 700; fill: #111827; letter-spacing: 0.04em; }
    .legend { font-size: 11px; fill: #6b7280; }
  </style>
  <defs>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#2563eb"/>
    </marker>
    <marker id="arr-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#dc2626"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#16a34a"/>
    </marker>
    <marker id="arr-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#ea580c"/>
    </marker>
    <marker id="arr-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#9333ea"/>
    </marker>
    <marker id="arr-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#6b7280"/>
    </marker>
  </defs>
  <rect width="1300" height="950" fill="#ffffff"/>
  <text x="650" y="36" text-anchor="middle" class="title">iOS / iPadOS Triage Decision Tree</text>
  <text x="650" y="58" text-anchor="middle" class="subtitle">iOS / iPadOS via Microsoft Intune  ·  docs/decision-trees/07-ios-triage.md</text>
  <polygon points="650,80 775,125 650,170 525,125" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="650" y="115" text-anchor="middle" class="label">Device visible in Intune</text>
  <text x="650" y="131" text-anchor="middle" class="label">Devices &gt; iOS/iPadOS?</text>
  <text x="650" y="147" text-anchor="middle" class="sub">IOS1</text>
  <path d="M 525,125 L 320,125 L 320,210" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arr-blue)"/>
  <rect x="406" y="108" width="28" height="14" fill="#ffffff" opacity="0.95"/>
  <text x="420" y="118" text-anchor="middle" class="edge">No</text>
  <rect x="70" y="215" width="500" height="90" rx="8" ry="8" fill="#faf5ff" stroke="#9333ea" stroke-width="1.5"/>
  <text x="320" y="250" text-anchor="middle" class="label">What did the user</text>
  <text x="320" y="266" text-anchor="middle" class="label">see or attempt?</text>
  <text x="320" y="282" text-anchor="middle" class="sub">IOS2 · 6 routes</text>
  <path d="M 775,125 L 980,125 L 980,210" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arr-blue)"/>
  <rect x="866" y="108" width="28" height="14" fill="#ffffff" opacity="0.95"/>
  <text x="880" y="118" text-anchor="middle" class="edge">Yes</text>
