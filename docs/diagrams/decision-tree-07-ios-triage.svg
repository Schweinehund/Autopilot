  <text x="980" y="250" text-anchor="middle" class="label">What is the</text>
  <text x="980" y="266" text-anchor="middle" class="label">primary symptom?</text>
  <text x="980" y="282" text-anchor="middle" class="sub">IOS3 · 3 routes</text>
  <rect x="60" y="380" width="180" height="80" rx="8" ry="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="150" y="418" text-anchor="middle" class="label">APNs Expired</text>
  <text x="150" y="434" text-anchor="middle" class="sub">L1 RB 16</text>
  <path d="M 320,305 L 150,380" stroke="#16a34a" stroke-width="1.5" fill="none" marker-end="url(#arr-green)"/>
  <rect x="114" y="330" width="53" height="14" fill="#ffffff" opacity="0.95"/>
  <text x="140" y="340" text-anchor="middle" class="edge">fleetwide</text>
  <rect x="260" y="380" width="180" height="80" rx="8" ry="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="350" y="418" text-anchor="middle" class="label">ADE Not Starting</text>
  <text x="350" y="434" text-anchor="middle" class="sub">L1 RB 17</text>
  <path d="M 320,305 L 350,380" stroke="#16a34a" stroke-width="1.5" fill="none" marker-end="url(#arr-green)"/>
  <rect x="314" y="350" width="53" height="14" fill="#ffffff" opacity="0.95"/>
  <text x="340" y="360" text-anchor="middle" class="edge">ADE stuck</text>
  <rect x="460" y="380" width="180" height="80" rx="8" ry="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="550" y="418" text-anchor="middle" class="label">Enrollment Restriction</text>
  <text x="550" y="434" text-anchor="middle" class="sub">L1 RB 18</text>
  <path d="M 320,305 L 550,380" stroke="#16a34a" stroke-width="1.5" fill="none" marker-end="url(#arr-green)"/>
  <rect x="499" y="330" width="83" height="14" fill="#ffffff" opacity="0.95"/>
  <text x="540" y="340" text-anchor="middle" class="edge">Invalid Profile</text>
  <rect x="60" y="500" width="180" height="80" rx="8" ry="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="150" y="538" text-anchor="middle" class="label">License Invalid</text>
  <text x="150" y="554" text-anchor="middle" class="sub">L1 RB 19</text>
  <path d="M 320,305 L 150,500" stroke="#16a34a" stroke-width="1.5" fill="none" marker-end="url(#arr-green)"/>
  <rect x="119" y="350" width="43" height="14" fill="#ffffff" opacity="0.95"/>
  <text x="140" y="360" text-anchor="middle" class="edge">license</text>
  <rect x="260" y="500" width="180" height="80" rx="8" ry="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="350" y="538" text-anchor="middle" class="label">Device Cap Reached</text>
  <text x="350" y="554" text-anchor="middle" class="sub">L1 RB 20</text>
  <path d="M 320,305 L 350,500" stroke="#16a34a" stroke-width="1.5" fill="none" marker-end="url(#arr-green)"/>
  <rect x="326" y="330" width="28" height="14" fill="#ffffff" opacity="0.95"/>
  <text x="340" y="340" text-anchor="middle" class="edge">cap</text>
  <rect x="460" y="500" width="180" height="80" rx="8" ry="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="550" y="538" text-anchor="middle" class="label">Escalate L2</text>
  <text x="550" y="554" text-anchor="middle" class="sub">Other / unclear</text>
  <path d="M 320,305 L 550,500" stroke="#dc2626" stroke-width="1.5" fill="none" marker-end="url(#arr-red)"/>
  <rect x="524" y="350" width="33" height="14" fill="#ffffff" opacity="0.95"/>
  <text x="540" y="360" text-anchor="middle" class="edge">other</text>
  <rect x="730" y="400" width="160" height="80" rx="8" ry="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="810" y="438" text-anchor="middle" class="label">Compliance Blocked</text>
  <text x="810" y="454" text-anchor="middle" class="sub">L1 RB 21</text>
  <path d="M 980,305 L 810,400" stroke="#16a34a" stroke-width="1.5" fill="none" marker-end="url(#arr-green)"/>
  <rect x="781" y="340" width="58" height="14" fill="#ffffff" opacity="0.95"/>
  <text x="810" y="350" text-anchor="middle" class="edge">compliance</text>
  <rect x="905" y="400" width="160" height="80" rx="8" ry="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="985" y="438" text-anchor="middle" class="label">Escalate L2</text>
  <text x="985" y="454" text-anchor="middle" class="sub">iOS L2 index</text>
  <path d="M 980,305 L 985,400" stroke="#dc2626" stroke-width="1.5" fill="none" marker-end="url(#arr-red)"/>
  <rect x="936" y="340" width="98" height="14" fill="#ffffff" opacity="0.95"/>
  <text x="985" y="350" text-anchor="middle" class="edge">profile/config/app</text>
  <rect x="1080" y="400" width="160" height="80" rx="8" ry="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="1160" y="438" text-anchor="middle" class="label">Escalate L2</text>
  <text x="1160" y="454" text-anchor="middle" class="sub">Other / unclear</text>
  <path d="M 980,305 L 1160,400" stroke="#dc2626" stroke-width="1.5" fill="none" marker-end="url(#arr-red)"/>
  <rect x="1144" y="340" width="33" height="14" fill="#ffffff" opacity="0.95"/>
  <text x="1160" y="350" text-anchor="middle" class="edge">other</text>
  <rect x="30" y="915" width="14" height="14" rx="3" ry="3" fill="#eff6ff" stroke="#2563eb" stroke-width="1.2"/>
  <text x="52" y="926" class="legend">Decision</text>
  <rect x="118" y="915" width="14" height="14" rx="3" ry="3" fill="#faf5ff" stroke="#9333ea" stroke-width="1.2"/>
  <text x="140" y="926" class="legend">Symptom router</text>
  <rect x="242" y="915" width="14" height="14" rx="3" ry="3" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.2"/>
  <text x="264" y="926" class="legend">Resolved (L1 RB)</text>
  <rect x="378" y="915" width="14" height="14" rx="3" ry="3" fill="#fef2f2" stroke="#dc2626" stroke-width="1.2"/>
  <text x="400" y="926" class="legend">Escalate L2</text>
  <text x="1280" y="942" text-anchor="end" class="legend">docs/diagrams/decision-tree-07-ios-triage.svg</text>
</svg>
