<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1100" width="1500" height="1100">
  <style>
    text { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace; fill: #e2e8f0; letter-spacing: 0.02em; }
    .title { font-size: 18px; font-weight: 700; fill: #e2e8f0; letter-spacing: 0.02em; }
    .subtitle { font-size: 12px; fill: #94a3b8; }
    .label { font-size: 13px; fill: #e2e8f0; }
    .sub { font-size: 11px; fill: #94a3b8; }
    .edge { font-size: 11px; fill: #cbd5e1; font-weight: 700; }
    .col-head { font-size: 13px; font-weight: 700; fill: #cbd5e1; letter-spacing: 0.08em; }
    .legend { font-size: 11px; fill: #94a3b8; }
  </style>
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#3b82f6"/>
    </marker>
    <marker id="arr-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#ef4444"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#10b981"/>
    </marker>
    <marker id="arr-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#f97316"/>
    </marker>
    <marker id="arr-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#a855f7"/>
    </marker>
    <marker id="arr-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1500" height="1100" fill="url(#bg-grad)"/>
  <text x="750" y="36" text-anchor="middle" class="title">TPM Attestation Decision Tree</text>
  <text x="750" y="58" text-anchor="middle" class="subtitle">APv1 · Pre-provisioning / Self-deploying TPM 2.0  ·  docs/decision-trees/03-tpm-attestation.md</text>
  <polygon points="750,90 900,135 750,180 600,135" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="750" y="125" text-anchor="middle" class="label">TPM-related error during</text>
  <text x="750" y="141" text-anchor="middle" class="label">pre-prov / self-deploy?</text>
  <text x="750" y="157" text-anchor="middle" class="sub">TPD1</text>
  <rect x="40" y="105" width="240" height="60" rx="8" ry="8" fill="#052e16" stroke="#10b981" stroke-width="1.5"/>
  <text x="160" y="133" text-anchor="middle" class="label">Return to Initial Triage</text>
  <text x="160" y="149" text-anchor="middle" class="sub">TPR0</text>
  <path d="M 600,135 L 280,135" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arr-green)"/>
  <rect x="426" y="118" width="28" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="440" y="128" text-anchor="middle" class="edge">No</text>
  <polygon points="750,230 880,275 750,320 620,275" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="750" y="265" text-anchor="middle" class="label">TPM enabled</text>
  <text x="750" y="281" text-anchor="middle" class="label">in BIOS?</text>
  <text x="750" y="297" text-anchor="middle" class="sub">TPD2 · 3-way</text>
  <path d="M 750,180 L 750,230" stroke="#3b82f6" stroke-width="1.5" fill="none" marker-end="url(#arr-blue)"/>
  <rect x="761" y="208" width="28" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="775" y="218" text-anchor="middle" class="edge">Yes</text>
  <rect x="1200" y="245" width="260" height="60" rx="8" ry="8" fill="#450a0a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="1330" y="273" text-anchor="middle" class="label">Escalate L2</text>
  <text x="1330" y="289" text-anchor="middle" class="sub">Cannot access BIOS  ·  TPE5</text>
  <path d="M 880,275 L 1200,275" stroke="#ef4444" stroke-width="1.5" fill="none" marker-end="url(#arr-red)"/>
  <rect x="921" y="258" width="58" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="950" y="268" text-anchor="middle" class="edge">Don&#x27;t know</text>
  <rect x="40" y="245" width="260" height="60" rx="8" ry="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="170" y="265" text-anchor="middle" class="label">Enable TPM in BIOS,</text>
  <text x="170" y="281" text-anchor="middle" class="label">save settings</text>
  <text x="170" y="297" text-anchor="middle" class="sub">TPA1</text>
  <path d="M 620,275 L 300,275" stroke="#3b82f6" stroke-width="1.5" fill="none" marker-end="url(#arr-blue)"/>
  <rect x="476" y="258" width="28" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="490" y="268" text-anchor="middle" class="edge">No</text>
  <polygon points="170,330 300,370 170,410 40,370" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="170" y="360" text-anchor="middle" class="label">Retry — provisioning</text>
  <text x="170" y="376" text-anchor="middle" class="label">succeeded?</text>
  <text x="170" y="392" text-anchor="middle" class="sub">TPD3</text>
  <path d="M 170,305 L 170,330" stroke="#3b82f6" stroke-width="1.5" fill="none" marker-end="url(#arr-blue)"/>
  <rect x="40" y="430" width="120" height="60" rx="8" ry="8" fill="#052e16" stroke="#10b981" stroke-width="1.5"/>
  <text x="100" y="458" text-anchor="middle" class="label">Resolved</text>
  <text x="100" y="474" text-anchor="middle" class="sub">TPR1</text>
  <rect x="180" y="430" width="120" height="60" rx="8" ry="8" fill="#450a0a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="240" y="458" text-anchor="middle" class="label">Escalate L2</text>
  <text x="240" y="474" text-anchor="middle" class="sub">TPE1</text>
  <path d="M 110,410 L 100,430" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arr-green)"/>
  <rect x="71" y="415" width="28" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="85" y="425" text-anchor="middle" class="edge">Yes</text>
  <path d="M 230,410 L 240,430" stroke="#ef4444" stroke-width="1.5" fill="none" marker-end="url(#arr-red)"/>
  <rect x="241" y="415" width="28" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="255" y="425" text-anchor="middle" class="edge">No</text>
  <polygon points="750,380 880,425 750,470 620,425" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="750" y="423" text-anchor="middle" class="label">TPM version 2.0?</text>
  <text x="750" y="439" text-anchor="middle" class="sub">TPD4</text>
  <path d="M 750,320 L 750,380" stroke="#3b82f6" stroke-width="1.5" fill="none" marker-end="url(#arr-blue)"/>
  <rect x="761" y="358" width="28" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="775" y="368" text-anchor="middle" class="edge">Yes</text>
  <rect x="1200" y="395" width="260" height="60" rx="8" ry="8" fill="#450a0a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="1330" y="416" text-anchor="middle" class="label">Escalate L2</text>
  <text x="1330" y="432" text-anchor="middle" class="sub">Version too old (1.2)</text>
  <text x="1330" y="445" text-anchor="middle" class="sub">TPE2 · hardware replace</text>
  <path d="M 880,425 L 1200,425" stroke="#ef4444" stroke-width="1.5" fill="none" marker-end="url(#arr-red)"/>
  <rect x="966" y="408" width="48" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="990" y="418" text-anchor="middle" class="edge">No (1.2)</text>
  <polygon points="750,530 880,575 750,620 620,575" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="750" y="565" text-anchor="middle" class="label">Error screen shows</text>
  <text x="750" y="581" text-anchor="middle" class="label">an error code?</text>
  <text x="750" y="597" text-anchor="middle" class="sub">TPD5</text>
  <path d="M 750,470 L 750,530" stroke="#3b82f6" stroke-width="1.5" fill="none" marker-end="url(#arr-blue)"/>
  <rect x="761" y="508" width="28" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="775" y="518" text-anchor="middle" class="edge">Yes</text>
  <rect x="1100" y="545" width="280" height="60" rx="8" ry="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="1240" y="565" text-anchor="middle" class="label">Look up code in</text>
  <text x="1240" y="581" text-anchor="middle" class="label">TPM error table</text>
  <text x="1240" y="597" text-anchor="middle" class="sub">TPA2</text>
  <path d="M 880,575 L 1100,575" stroke="#3b82f6" stroke-width="1.5" fill="none" marker-end="url(#arr-blue)"/>
  <rect x="926" y="558" width="28" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="940" y="568" text-anchor="middle" class="edge">Yes</text>
  <rect x="1080" y="695" width="150" height="60" rx="8" ry="8" fill="#052e16" stroke="#10b981" stroke-width="1.5"/>
  <text x="1155" y="723" text-anchor="middle" class="label">Resolved</text>
  <text x="1155" y="739" text-anchor="middle" class="sub">found · TPR2</text>
  <rect x="1250" y="695" width="150" height="60" rx="8" ry="8" fill="#450a0a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="1325" y="723" text-anchor="middle" class="label">Escalate L2</text>
  <text x="1325" y="739" text-anchor="middle" class="sub">not found · TPE3</text>
  <path d="M 1200,605 L 1155,695" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arr-green)"/>
  <rect x="1124" y="675" width="33" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="1140" y="685" text-anchor="middle" class="edge">found</text>
  <path d="M 1280,605 L 1325,695" stroke="#ef4444" stroke-width="1.5" fill="none" marker-end="url(#arr-red)"/>
  <rect x="1314" y="675" width="53" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="1340" y="685" text-anchor="middle" class="edge">not found</text>
  <rect x="40" y="545" width="280" height="60" rx="8" ry="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="180" y="565" text-anchor="middle" class="label">Power off, wait 30s,</text>
  <text x="180" y="581" text-anchor="middle" class="label">retry provisioning</text>
  <text x="180" y="597" text-anchor="middle" class="sub">TPA3</text>
  <path d="M 620,575 L 320,575" stroke="#3b82f6" stroke-width="1.5" fill="none" marker-end="url(#arr-blue)"/>
  <rect x="486" y="558" width="28" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="500" y="568" text-anchor="middle" class="edge">No</text>
  <polygon points="180,680 320,720 180,760 40,720" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="180" y="710" text-anchor="middle" class="label">Provisioning succeeded</text>
  <text x="180" y="726" text-anchor="middle" class="label">after retry?</text>
  <text x="180" y="742" text-anchor="middle" class="sub">TPD6</text>
  <path d="M 180,605 L 180,680" stroke="#3b82f6" stroke-width="1.5" fill="none" marker-end="url(#arr-blue)"/>
  <rect x="40" y="780" width="130" height="60" rx="8" ry="8" fill="#052e16" stroke="#10b981" stroke-width="1.5"/>
  <text x="105" y="808" text-anchor="middle" class="label">Resolved</text>
  <text x="105" y="824" text-anchor="middle" class="sub">TPR3</text>
  <rect x="190" y="780" width="130" height="60" rx="8" ry="8" fill="#450a0a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="255" y="808" text-anchor="middle" class="label">Escalate L2</text>
  <text x="255" y="824" text-anchor="middle" class="sub">No code · TPE4</text>
  <path d="M 110,760 L 105,780" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arr-green)"/>
  <rect x="71" y="765" width="28" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="85" y="775" text-anchor="middle" class="edge">Yes</text>
  <path d="M 250,760 L 255,780" stroke="#ef4444" stroke-width="1.5" fill="none" marker-end="url(#arr-red)"/>
  <rect x="261" y="765" width="28" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="275" y="775" text-anchor="middle" class="edge">No</text>
  <rect x="30" y="1065" width="14" height="14" rx="3" ry="3" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="52" y="1076" class="legend">Decision / Action</text>
  <rect x="172" y="1065" width="14" height="14" rx="3" ry="3" fill="#052e16" stroke="#10b981" stroke-width="1.2"/>
  <text x="194" y="1076" class="legend">Resolved</text>
  <rect x="260" y="1065" width="14" height="14" rx="3" ry="3" fill="#450a0a" stroke="#ef4444" stroke-width="1.2"/>
  <text x="282" y="1076" class="legend">Escalate L2</text>
  <text x="1480" y="1092" text-anchor="end" class="legend">docs/diagrams/decision-tree-03-tpm-attestation.svg</text>
</svg>
