<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 800" width="1100" height="800">
  <style>
    text { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace; fill: #e2e8f0; letter-spacing: 0.02em; }
    .title { font-size: 18px; font-weight: 700; fill: #e2e8f0; letter-spacing: 0.02em; }
    .subtitle { font-size: 12px; fill: #94a3b8; }
    .label { font-size: 13px; fill: #e2e8f0; }
    .sub { font-size: 11px; fill: #94a3b8; }
    .edge { font-size: 11px; fill: #cbd5e1; font-weight: 700; }
    .col-head { font-size: 13px; font-weight: 700; fill: #cbd5e1; letter-spacing: 0.08em; }
    .legend { font-size: 11px; fill: #94a3b8; }
  </style>
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#3b82f6"/>
    </marker>
    <marker id="arr-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#ef4444"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#10b981"/>
    </marker>
    <marker id="arr-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#f97316"/>
    </marker>
    <marker id="arr-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#a855f7"/>
    </marker>
    <marker id="arr-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1100" height="800" fill="url(#bg-grad)"/>
  <text x="550" y="36" text-anchor="middle" class="title">APv2 Device Preparation Triage</text>
  <text x="550" y="58" text-anchor="middle" class="subtitle">Windows Autopilot Device Preparation  ·  docs/decision-trees/04-apv2-triage.md</text>
  <polygon points="550,80 675,120 550,160 425,120" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="550" y="110" text-anchor="middle" class="label">ESP displayed</text>
  <text x="550" y="126" text-anchor="middle" class="label">during OOBE?</text>
  <text x="550" y="142" text-anchor="middle" class="sub">APD1</text>
  <rect x="50" y="100" width="250" height="60" rx="8" ry="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="175" y="120" text-anchor="middle" class="label">Possible APv1</text>
  <text x="175" y="136" text-anchor="middle" class="label">registration conflict</text>
  <text x="175" y="152" text-anchor="middle" class="sub">APA1</text>
  <path d="M 425,120 L 300,120" stroke="#3b82f6" stroke-width="1.5" fill="none" marker-end="url(#arr-blue)"/>
  <rect x="346" y="103" width="28" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="360" y="113" text-anchor="middle" class="edge">Yes</text>
  <rect x="50" y="200" width="250" height="50" rx="8" ry="8" fill="#052e16" stroke="#10b981" stroke-width="1.5"/>
  <text x="175" y="223" text-anchor="middle" class="label">See: APv1 Reg Conflict</text>
  <text x="175" y="239" text-anchor="middle" class="sub">L1 RB 08  ·  APR1</text>
  <path d="M 175,160 L 175,200" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arr-green)"/>
  <path d="M 550,160 L 550,205" stroke="#3b82f6" stroke-width="1.5" fill="none" marker-end="url(#arr-blue)"/>
  <rect x="561" y="182" width="28" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="575" y="192" text-anchor="middle" class="edge">No</text>
  <polygon points="550,210 675,250 550,290 425,250" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="550" y="240" text-anchor="middle" class="label">Device Preparation</text>
  <text x="550" y="256" text-anchor="middle" class="label">screen appeared?</text>
  <text x="550" y="272" text-anchor="middle" class="sub">APD2</text>
  <rect x="50" y="230" width="250" height="60" rx="8" ry="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="175" y="250" text-anchor="middle" class="label">Deployment never</text>
  <text x="175" y="266" text-anchor="middle" class="label">launched</text>
  <text x="175" y="282" text-anchor="middle" class="sub">APA2</text>
  <path d="M 425,250 L 300,250" stroke="#3b82f6" stroke-width="1.5" fill="none" marker-end="url(#arr-blue)"/>
  <rect x="346" y="233" width="28" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="360" y="243" text-anchor="middle" class="edge">No</text>
  <rect x="50" y="330" width="250" height="50" rx="8" ry="8" fill="#052e16" stroke="#10b981" stroke-width="1.5"/>
  <text x="175" y="353" text-anchor="middle" class="label">See: Deployment Not Launched</text>
  <text x="175" y="369" text-anchor="middle" class="sub">L1 RB 06  ·  APR2</text>
  <path d="M 175,290 L 175,330" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arr-green)"/>
  <path d="M 550,290 L 550,335" stroke="#3b82f6" stroke-width="1.5" fill="none" marker-end="url(#arr-blue)"/>
  <rect x="561" y="312" width="28" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="575" y="322" text-anchor="middle" class="edge">Yes</text>
  <rect x="380" y="340" width="340" height="100" rx="8" ry="8" fill="#1e1b4b" stroke="#a855f7" stroke-width="1.5"/>
  <text x="550" y="380" text-anchor="middle" class="label">What is the primary</text>
  <text x="550" y="396" text-anchor="middle" class="label">failure symptom?</text>
  <text x="550" y="412" text-anchor="middle" class="sub">APD3</text>
  <rect x="40" y="510" width="230" height="60" rx="8" ry="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="155" y="530" text-anchor="middle" class="label">Check app assignment</text>
  <text x="155" y="546" text-anchor="middle" class="label">+ deployment report</text>
  <text x="155" y="562" text-anchor="middle" class="sub">APA3</text>
  <path d="M 380,440 L 155,510" stroke="#a855f7" stroke-width="1.5" fill="none" marker-end="url(#arr-purple)"/>
  <rect x="221" y="462" width="68" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="255" y="472" text-anchor="middle" class="edge">apps/scripts</text>
  <rect x="40" y="600" width="230" height="50" rx="8" ry="8" fill="#052e16" stroke="#10b981" stroke-width="1.5"/>
  <text x="155" y="623" text-anchor="middle" class="label">See: Apps Not Installed</text>
  <text x="155" y="639" text-anchor="middle" class="sub">L1 RB 07  ·  APR3</text>
  <path d="M 155,570 L 155,600" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arr-green)"/>
  <rect x="290" y="510" width="230" height="60" rx="8" ry="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="405" y="530" text-anchor="middle" class="label">Check timeout settings</text>
  <text x="405" y="546" text-anchor="middle" class="label">+ app count</text>
  <text x="405" y="562" text-anchor="middle" class="sub">APA4</text>
  <path d="M 480,440 L 405,510" stroke="#a855f7" stroke-width="1.5" fill="none" marker-end="url(#arr-purple)"/>
  <rect x="414" y="462" width="53" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="440" y="472" text-anchor="middle" class="edge">timed out</text>
  <rect x="290" y="600" width="230" height="50" rx="8" ry="8" fill="#052e16" stroke="#10b981" stroke-width="1.5"/>
  <text x="405" y="623" text-anchor="middle" class="label">See: Deployment Timeout</text>
  <text x="405" y="639" text-anchor="middle" class="sub">L1 RB 09  ·  APR4</text>
  <path d="M 405,570 L 405,600" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arr-green)"/>
  <rect x="540" y="510" width="230" height="70" rx="8" ry="8" fill="#450a0a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="655" y="536" text-anchor="middle" class="label">Escalate L2</text>
  <text x="655" y="552" text-anchor="middle" class="sub">Entra join failed</text>
  <text x="655" y="565" text-anchor="middle" class="sub">APE1</text>
  <path d="M 580,440 L 655,510" stroke="#ef4444" stroke-width="1.5" fill="none" marker-end="url(#arr-red)"/>
  <rect x="586" y="462" width="58" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="615" y="472" text-anchor="middle" class="edge">Entra join</text>
  <rect x="790" y="510" width="230" height="70" rx="8" ry="8" fill="#450a0a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="905" y="536" text-anchor="middle" class="label">Escalate L2</text>
  <text x="905" y="552" text-anchor="middle" class="sub">Enrollment failed</text>
  <text x="905" y="565" text-anchor="middle" class="sub">APE2</text>
  <path d="M 680,440 L 905,510" stroke="#ef4444" stroke-width="1.5" fill="none" marker-end="url(#arr-red)"/>
  <rect x="771" y="462" width="58" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="800" y="472" text-anchor="middle" class="edge">enrollment</text>
  <rect x="540" y="600" width="480" height="70" rx="8" ry="8" fill="#450a0a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="780" y="626" text-anchor="middle" class="label">Escalate L2</text>
  <text x="780" y="642" text-anchor="middle" class="sub">IME failed or other</text>
  <text x="780" y="655" text-anchor="middle" class="sub">APE3 · deployment report phase details</text>
  <path d="M 720,400 L 770,600" stroke="#ef4444" stroke-width="1.5" fill="none" marker-end="url(#arr-red)"/>
  <rect x="714" y="490" width="63" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="745" y="500" text-anchor="middle" class="edge">IME / other</text>
  <rect x="30" y="765" width="14" height="14" rx="3" ry="3" fill="#eff6ff" stroke="#2563eb" stroke-width="1.2"/>
  <text x="52" y="776" class="legend">Decision / Action</text>
  <rect x="172" y="765" width="14" height="14" rx="3" ry="3" fill="#faf5ff" stroke="#9333ea" stroke-width="1.2"/>
  <text x="194" y="776" class="legend">Symptom router</text>
  <rect x="296" y="765" width="14" height="14" rx="3" ry="3" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.2"/>
  <text x="318" y="776" class="legend">Resolved (L1 RB)</text>
  <rect x="432" y="765" width="14" height="14" rx="3" ry="3" fill="#fef2f2" stroke="#dc2626" stroke-width="1.2"/>
  <text x="454" y="776" class="legend">Escalate L2</text>
  <text x="1080" y="792" text-anchor="end" class="legend">docs/diagrams/decision-tree-04-apv2-triage.svg</text>
</svg>
