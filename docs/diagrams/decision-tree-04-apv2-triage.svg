  <rect width="1500" height="900" fill="url(#bg-grad)"/>
  <text x="750" y="36" text-anchor="middle" class="title">APv2 Device Preparation Triage</text>
  <text x="750" y="58" text-anchor="middle" class="subtitle">Windows Autopilot Device Preparation  ·  docs/decision-trees/04-apv2-triage.md</text>
  <polygon points="750,90 880,135 750,180 620,135" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="750" y="125" text-anchor="middle" class="label">ESP displayed</text>
  <text x="750" y="141" text-anchor="middle" class="label">during OOBE?</text>
  <text x="750" y="157" text-anchor="middle" class="sub">APD1</text>
  <rect x="40" y="105" width="260" height="60" rx="8" ry="8" fill="#052e16" stroke="#10b981" stroke-width="1.5"/>
  <text x="170" y="133" text-anchor="middle" class="label">See: APv1 Conflict</text>
  <text x="170" y="149" text-anchor="middle" class="sub">L1 RB 08  ·  APR1</text>
  <path d="M 620,135 L 300,135" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arr-green)"/>
  <rect x="436" y="118" width="28" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="450" y="128" text-anchor="middle" class="edge">Yes</text>
  <polygon points="750,230 880,275 750,320 620,275" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="750" y="265" text-anchor="middle" class="label">Device Preparation</text>
  <text x="750" y="281" text-anchor="middle" class="label">screen appeared?</text>
  <text x="750" y="297" text-anchor="middle" class="sub">APD2</text>
  <path d="M 750,180 L 750,230" stroke="#3b82f6" stroke-width="1.5" fill="none" marker-end="url(#arr-blue)"/>
  <rect x="761" y="208" width="28" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="775" y="218" text-anchor="middle" class="edge">No</text>
  <rect x="40" y="245" width="260" height="60" rx="8" ry="8" fill="#052e16" stroke="#10b981" stroke-width="1.5"/>
  <text x="170" y="273" text-anchor="middle" class="label">See: Deployment Not Launched</text>
  <text x="170" y="289" text-anchor="middle" class="sub">L1 RB 06  ·  APR2</text>
  <path d="M 620,275 L 300,275" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arr-green)"/>
  <rect x="436" y="258" width="28" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="450" y="268" text-anchor="middle" class="edge">No</text>
  <rect x="550" y="380" width="400" height="110" rx="8" ry="8" fill="#1e1b4b" stroke="#a855f7" stroke-width="1.5"/>
  <text x="750" y="425" text-anchor="middle" class="label">What is the primary</text>
  <text x="750" y="441" text-anchor="middle" class="label">failure symptom?</text>
  <text x="750" y="457" text-anchor="middle" class="sub">APD3 · 5 routes</text>
  <path d="M 750,320 L 750,380" stroke="#3b82f6" stroke-width="1.5" fill="none" marker-end="url(#arr-blue)"/>
  <rect x="761" y="358" width="28" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="775" y="368" text-anchor="middle" class="edge">Yes</text>
  <rect x="70" y="560" width="240" height="100" rx="8" ry="8" fill="#052e16" stroke="#10b981" stroke-width="1.5"/>
  <text x="190" y="608" text-anchor="middle" class="label">Apps Not Installed</text>
  <text x="190" y="624" text-anchor="middle" class="sub">L1 RB 07  ·  APR3</text>
  <path d="M 750,490 L 750,520 L 190,520 L 190,560" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arr-green)"/>
  <rect x="151" y="502" width="78" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="190" y="512" text-anchor="middle" class="edge">apps / scripts</text>
  <rect x="350" y="560" width="240" height="100" rx="8" ry="8" fill="#052e16" stroke="#10b981" stroke-width="1.5"/>
  <text x="470" y="608" text-anchor="middle" class="label">Deployment Timeout</text>
  <text x="470" y="624" text-anchor="middle" class="sub">L1 RB 09  ·  APR4</text>
  <path d="M 750,490 L 750,520 L 470,520 L 470,560" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arr-green)"/>
  <rect x="444" y="502" width="53" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="470" y="512" text-anchor="middle" class="edge">timed out</text>
  <rect x="630" y="560" width="240" height="100" rx="8" ry="8" fill="#450a0a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="750" y="608" text-anchor="middle" class="label">Entra Join Failed</text>
  <text x="750" y="624" text-anchor="middle" class="sub">APE1</text>
  <path d="M 750,490 L 750,520 L 750,520 L 750,560" stroke="#ef4444" stroke-width="1.5" fill="none" marker-end="url(#arr-red)"/>
  <rect x="721" y="502" width="58" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="750" y="512" text-anchor="middle" class="edge">Entra join</text>
  <rect x="910" y="560" width="240" height="100" rx="8" ry="8" fill="#450a0a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="1030" y="608" text-anchor="middle" class="label">Enrollment Failed</text>
  <text x="1030" y="624" text-anchor="middle" class="sub">APE2</text>
  <path d="M 750,490 L 750,520 L 1030,520 L 1030,560" stroke="#ef4444" stroke-width="1.5" fill="none" marker-end="url(#arr-red)"/>
  <rect x="1001" y="502" width="58" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="1030" y="512" text-anchor="middle" class="edge">enrollment</text>
  <rect x="1190" y="560" width="240" height="100" rx="8" ry="8" fill="#450a0a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="1310" y="608" text-anchor="middle" class="label">IME / Other</text>
  <text x="1310" y="624" text-anchor="middle" class="sub">APE3</text>
  <path d="M 750,490 L 750,520 L 1310,520 L 1310,560" stroke="#ef4444" stroke-width="1.5" fill="none" marker-end="url(#arr-red)"/>
  <rect x="1279" y="502" width="63" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="1310" y="512" text-anchor="middle" class="edge">IME / other</text>
  <rect x="30" y="865" width="14" height="14" rx="3" ry="3" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="52" y="876" class="legend">Decision / Action</text>
  <rect x="172" y="865" width="14" height="14" rx="3" ry="3" fill="#1e1b4b" stroke="#a855f7" stroke-width="1.2"/>
  <text x="194" y="876" class="legend">Symptom router</text>
  <rect x="296" y="865" width="14" height="14" rx="3" ry="3" fill="#052e16" stroke="#10b981" stroke-width="1.2"/>
  <text x="318" y="876" class="legend">Resolved (L1 RB)</text>
  <rect x="432" y="865" width="14" height="14" rx="3" ry="3" fill="#450a0a" stroke="#ef4444" stroke-width="1.2"/>
  <text x="454" y="876" class="legend">Escalate L2</text>
  <text x="1480" y="892" text-anchor="end" class="legend">docs/diagrams/decision-tree-04-apv2-triage.svg</text>
</svg>
