<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1000" width="1500" height="1000">
  <style>
    text { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace; fill: #e2e8f0; letter-spacing: 0.02em; }
    .title { font-size: 18px; font-weight: 700; fill: #e2e8f0; letter-spacing: 0.02em; }
    .subtitle { font-size: 12px; fill: #94a3b8; }
    .label { font-size: 13px; fill: #e2e8f0; }
    .sub { font-size: 11px; fill: #94a3b8; }
    .edge { font-size: 11px; fill: #cbd5e1; font-weight: 700; }
    .col-head { font-size: 13px; font-weight: 700; fill: #cbd5e1; letter-spacing: 0.08em; }
    .legend { font-size: 11px; fill: #94a3b8; }
  </style>
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#3b82f6"/>
    </marker>
    <marker id="arr-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#ef4444"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#10b981"/>
    </marker>
    <marker id="arr-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#f97316"/>
    </marker>
    <marker id="arr-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#a855f7"/>
    </marker>
    <marker id="arr-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1500" height="1000" fill="url(#bg-grad)"/>
  <text x="750" y="36" text-anchor="middle" class="title">ESP Failure Decision Tree</text>
  <text x="750" y="58" text-anchor="middle" class="subtitle">APv1 · Enrollment Status Page triage  ·  docs/decision-trees/01-esp-failure.md</text>
  <polygon points="900,90 1030,135 900,180 770,135" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="900" y="125" text-anchor="middle" class="label">Stuck on</text>
  <text x="900" y="141" text-anchor="middle" class="label">Enrollment Status Page?</text>
  <text x="900" y="157" text-anchor="middle" class="sub">ESD1</text>
  <rect x="40" y="105" width="240" height="60" rx="8" ry="8" fill="#052e16" stroke="#10b981" stroke-width="1.5"/>
  <text x="160" y="133" text-anchor="middle" class="label">Return to Initial Triage</text>
  <text x="160" y="149" text-anchor="middle" class="sub">ESR0</text>
  <path d="M 770,135 L 280,135" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arr-green)"/>
  <rect x="526" y="118" width="28" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="540" y="128" text-anchor="middle" class="edge">No</text>
  <polygon points="900,240 1030,285 900,330 770,285" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="900" y="275" text-anchor="middle" class="label">Does ESP show</text>
  <text x="900" y="291" text-anchor="middle" class="label">an error code?</text>
  <text x="900" y="307" text-anchor="middle" class="sub">ESD2</text>
  <path d="M 900,180 L 900,240" stroke="#3b82f6" stroke-width="1.5" fill="none" marker-end="url(#arr-blue)"/>
  <rect x="911" y="218" width="28" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="925" y="228" text-anchor="middle" class="edge">Yes</text>
  <polygon points="410,390 540,435 410,480 280,435" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="410" y="425" text-anchor="middle" class="label">What does the</text>
  <text x="410" y="441" text-anchor="middle" class="label">screen say?</text>
  <text x="410" y="457" text-anchor="middle" class="sub">ESD4 · 3-way</text>
  <polygon points="1350,390 1460,435 1350,480 1240,435" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="1350" y="425" text-anchor="middle" class="label">Can read</text>
  <text x="1350" y="441" text-anchor="middle" class="label">the error code?</text>
  <text x="1350" y="457" text-anchor="middle" class="sub">ESD3</text>
  <path d="M 840,330 L 840,360 L 410,360 L 410,390" stroke="#3b82f6" stroke-width="1.5" fill="none" marker-end="url(#arr-blue)"/>
  <rect x="666" y="342" width="28" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="680" y="352" text-anchor="middle" class="edge">No</text>
  <path d="M 960,330 L 960,360 L 1350,360 L 1350,390" stroke="#3b82f6" stroke-width="1.5" fill="none" marker-end="url(#arr-blue)"/>
  <rect x="1156" y="342" width="28" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="1170" y="352" text-anchor="middle" class="edge">Yes</text>
  <polygon points="150,580 260,625 150,670 40,625" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="150" y="615" text-anchor="middle" class="label">Stuck more than</text>
  <text x="150" y="631" text-anchor="middle" class="label">30 minutes?</text>
  <text x="150" y="647" text-anchor="middle" class="sub">ESD5 · device phase</text>
  <rect x="300" y="595" width="220" height="60" rx="8" ry="8" fill="#450a0a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="410" y="623" text-anchor="middle" class="label">Escalate L2</text>
  <text x="410" y="639" text-anchor="middle" class="sub">Cannot identify phase  ·  ESE3</text>
  <polygon points="670,580 780,625 670,670 560,625" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="670" y="615" text-anchor="middle" class="label">Stuck more than</text>
  <text x="670" y="631" text-anchor="middle" class="label">60 minutes?</text>
  <text x="670" y="647" text-anchor="middle" class="sub">ESD7 · user phase</text>
  <path d="M 410,480 L 410,510 L 150,510 L 150,580" stroke="#a855f7" stroke-width="1.5" fill="none" marker-end="url(#arr-purple)"/>
  <rect x="261" y="493" width="38" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="280" y="503" text-anchor="middle" class="edge">device</text>
  <path d="M 410,480 L 410,595" stroke="#a855f7" stroke-width="1.5" fill="none" marker-end="url(#arr-purple)"/>
  <rect x="409" y="493" width="63" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="440" y="503" text-anchor="middle" class="edge">cannot tell</text>
  <path d="M 410,480 L 410,510 L 670,510 L 670,580" stroke="#a855f7" stroke-width="1.5" fill="none" marker-end="url(#arr-purple)"/>
  <rect x="526" y="493" width="28" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="540" y="503" text-anchor="middle" class="edge">user</text>
  <rect x="1240" y="595" width="220" height="60" rx="8" ry="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="1350" y="615" text-anchor="middle" class="label">Look up code in</text>
  <text x="1350" y="631" text-anchor="middle" class="label">ESP error table</text>
  <text x="1350" y="647" text-anchor="middle" class="sub">ESA1</text>
  <rect x="1020" y="490" width="200" height="60" rx="8" ry="8" fill="#450a0a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="1120" y="518" text-anchor="middle" class="label">Escalate L2</text>
  <text x="1120" y="534" text-anchor="middle" class="sub">Cannot read code  ·  ESE2</text>
  <path d="M 1350,480 L 1350,595" stroke="#3b82f6" stroke-width="1.5" fill="none" marker-end="url(#arr-blue)"/>
  <rect x="1364" y="565" width="28" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="1378" y="575" text-anchor="middle" class="edge">Yes</text>
  <path d="M 1240,435 L 1180,435 L 1180,520 L 1220,520" stroke="#ef4444" stroke-width="1.5" fill="none" marker-end="url(#arr-red)"/>
  <rect x="1131" y="418" width="28" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="1145" y="428" text-anchor="middle" class="edge">No</text>
  <rect x="20" y="760" width="130" height="70" rx="8" ry="8" fill="#052e16" stroke="#10b981" stroke-width="1.5"/>
  <text x="85" y="786" text-anchor="middle" class="label">Within window</text>
  <text x="85" y="802" text-anchor="middle" class="sub">wait</text>
  <text x="85" y="815" text-anchor="middle" class="sub">ESR5</text>
  <rect x="170" y="760" width="200" height="70" rx="8" ry="8" fill="#450a0a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="270" y="785" text-anchor="middle" class="label">Reboot retry;</text>
  <text x="270" y="801" text-anchor="middle" class="label">escalate if persists</text>
  <text x="270" y="817" text-anchor="middle" class="sub">ESA2 → ESD6 → ESR2 / ESE4</text>
  <path d="M 90,670 L 90,760" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arr-green)"/>
  <rect x="61" y="738" width="28" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="75" y="748" text-anchor="middle" class="edge">≤30</text>
  <path d="M 220,670 L 260,760" stroke="#ef4444" stroke-width="1.5" fill="none" marker-end="url(#arr-red)"/>
  <rect x="276" y="738" width="28" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="290" y="748" text-anchor="middle" class="edge">&gt;30</text>
  <rect x="540" y="760" width="130" height="70" rx="8" ry="8" fill="#052e16" stroke="#10b981" stroke-width="1.5"/>
  <text x="605" y="786" text-anchor="middle" class="label">Within window</text>
  <text x="605" y="802" text-anchor="middle" class="sub">wait</text>
  <text x="605" y="815" text-anchor="middle" class="sub">ESR4</text>
  <rect x="690" y="760" width="200" height="70" rx="8" ry="8" fill="#450a0a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="790" y="785" text-anchor="middle" class="label">Reboot retry;</text>
  <text x="790" y="801" text-anchor="middle" class="label">escalate if persists</text>
  <text x="790" y="817" text-anchor="middle" class="sub">ESA3 → ESD8 → ESR3 / ESE5</text>
  <path d="M 600,670 L 600,760" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arr-green)"/>
  <rect x="571" y="738" width="28" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="585" y="748" text-anchor="middle" class="edge">≤60</text>
  <path d="M 740,670 L 770,760" stroke="#ef4444" stroke-width="1.5" fill="none" marker-end="url(#arr-red)"/>
  <rect x="786" y="738" width="28" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="800" y="748" text-anchor="middle" class="edge">&gt;60</text>
  <rect x="1180" y="760" width="140" height="70" rx="8" ry="8" fill="#052e16" stroke="#10b981" stroke-width="1.5"/>
  <text x="1250" y="786" text-anchor="middle" class="label">Resolved</text>
  <text x="1250" y="802" text-anchor="middle" class="sub">follow L1 Action</text>
  <text x="1250" y="815" text-anchor="middle" class="sub">found · ESR1</text>
  <rect x="1340" y="760" width="140" height="70" rx="8" ry="8" fill="#450a0a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="1410" y="786" text-anchor="middle" class="label">Escalate L2</text>
  <text x="1410" y="802" text-anchor="middle" class="sub">not in table</text>
  <text x="1410" y="815" text-anchor="middle" class="sub">ESE1</text>
  <path d="M 1300,655 L 1255,760" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arr-green)"/>
  <rect x="1224" y="738" width="33" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="1240" y="748" text-anchor="middle" class="edge">found</text>
  <path d="M 1400,655 L 1410,760" stroke="#ef4444" stroke-width="1.5" fill="none" marker-end="url(#arr-red)"/>
  <rect x="1439" y="738" width="53" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="1465" y="748" text-anchor="middle" class="edge">not found</text>
  <rect x="30" y="965" width="14" height="14" rx="3" ry="3" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="52" y="976" class="legend">Decision / Action</text>
  <rect x="172" y="965" width="14" height="14" rx="3" ry="3" fill="#1e1b4b" stroke="#a855f7" stroke-width="1.2"/>
  <text x="194" y="976" class="legend">Sub-tree route</text>
  <rect x="296" y="965" width="14" height="14" rx="3" ry="3" fill="#052e16" stroke="#10b981" stroke-width="1.2"/>
  <text x="318" y="976" class="legend">Resolved</text>
  <rect x="384" y="965" width="14" height="14" rx="3" ry="3" fill="#450a0a" stroke="#ef4444" stroke-width="1.2"/>
  <text x="406" y="976" class="legend">Escalate L2</text>
  <text x="1480" y="992" text-anchor="end" class="legend">docs/diagrams/decision-tree-01-esp-failure.svg</text>
</svg>
