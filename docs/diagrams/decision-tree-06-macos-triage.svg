<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 900" width="1500" height="900">
  <style>
    text { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace; fill: #e2e8f0; letter-spacing: 0.02em; }
    .title { font-size: 18px; font-weight: 700; fill: #e2e8f0; letter-spacing: 0.02em; }
    .subtitle { font-size: 12px; fill: #94a3b8; }
    .label { font-size: 13px; fill: #e2e8f0; }
    .sub { font-size: 11px; fill: #94a3b8; }
    .edge { font-size: 11px; fill: #cbd5e1; font-weight: 700; }
    .col-head { font-size: 13px; font-weight: 700; fill: #cbd5e1; letter-spacing: 0.08em; }
    .legend { font-size: 11px; fill: #94a3b8; }
  </style>
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#3b82f6"/>
    </marker>
    <marker id="arr-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#ef4444"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#10b981"/>
    </marker>
    <marker id="arr-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#f97316"/>
    </marker>
    <marker id="arr-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#a855f7"/>
    </marker>
    <marker id="arr-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1500" height="900" fill="url(#bg-grad)"/>
  <text x="750" y="36" text-anchor="middle" class="title">macOS ADE Triage Decision Tree</text>
  <text x="750" y="58" text-anchor="middle" class="subtitle">macOS Automated Device Enrollment  ·  docs/decision-trees/06-macos-triage.md</text>
  <polygon points="750,90 880,135 750,180 620,135" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="750" y="125" text-anchor="middle" class="label">Setup Assistant</text>
  <text x="750" y="141" text-anchor="middle" class="label">complete?</text>
  <text x="750" y="157" text-anchor="middle" class="sub">MAC1</text>
  <polygon points="320,230 460,280 320,330 180,280" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="320" y="270" text-anchor="middle" class="label">Device visible in Intune</text>
  <text x="320" y="286" text-anchor="middle" class="label">Devices &gt; macOS?</text>
  <text x="320" y="302" text-anchor="middle" class="sub">MAC2</text>
  <rect x="950" y="230" width="420" height="110" rx="8" ry="8" fill="#1e1b4b" stroke="#a855f7" stroke-width="1.5"/>
  <text x="1160" y="275" text-anchor="middle" class="label">What is the primary</text>
  <text x="1160" y="291" text-anchor="middle" class="label">symptom after setup?</text>
  <text x="1160" y="307" text-anchor="middle" class="sub">MAC3 · 5 routes</text>
