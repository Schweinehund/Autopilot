<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 850" width="1100" height="850">
  <style>
    text { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace; fill: #e2e8f0; letter-spacing: 0.02em; }
    .title { font-size: 18px; font-weight: 700; fill: #e2e8f0; letter-spacing: 0.02em; }
    .subtitle { font-size: 12px; fill: #94a3b8; }
    .label { font-size: 13px; fill: #e2e8f0; }
    .sub { font-size: 11px; fill: #94a3b8; }
    .edge { font-size: 11px; fill: #cbd5e1; font-weight: 700; }
    .col-head { font-size: 13px; font-weight: 700; fill: #cbd5e1; letter-spacing: 0.08em; }
    .legend { font-size: 11px; fill: #94a3b8; }
  </style>
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#3b82f6"/>
    </marker>
    <marker id="arr-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#ef4444"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#10b981"/>
    </marker>
    <marker id="arr-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#f97316"/>
    </marker>
    <marker id="arr-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#a855f7"/>
    </marker>
    <marker id="arr-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1100" height="850" fill="url(#bg-grad)"/>
  <text x="550" y="36" text-anchor="middle" class="title">macOS ADE Triage Decision Tree</text>
  <text x="550" y="58" text-anchor="middle" class="subtitle">macOS Automated Device Enrollment  ·  docs/decision-trees/06-macos-triage.md</text>
  <polygon points="550,80 675,125 550,170 425,125" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="550" y="115" text-anchor="middle" class="label">Setup Assistant</text>
  <text x="550" y="131" text-anchor="middle" class="label">complete?</text>
  <text x="550" y="147" text-anchor="middle" class="sub">MAC1</text>
  <path d="M 425,125 L 290,125 L 290,205" stroke="#3b82f6" stroke-width="1.5" fill="none" marker-end="url(#arr-blue)"/>
  <rect x="341" y="108" width="28" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="355" y="118" text-anchor="middle" class="edge">No</text>
  <polygon points="290,210 425,255 290,300 155,255" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="290" y="245" text-anchor="middle" class="label">Device visible in Intune</text>
  <text x="290" y="261" text-anchor="middle" class="label">Devices &gt; macOS?</text>
  <text x="290" y="277" text-anchor="middle" class="sub">MAC2</text>
  <rect x="50" y="350" width="220" height="70" rx="8" ry="8" fill="#052e16" stroke="#10b981" stroke-width="1.5"/>
  <text x="160" y="383" text-anchor="middle" class="label">Device Not Appearing</text>
  <text x="160" y="399" text-anchor="middle" class="sub">L1 RB 10  ·  MACR1</text>
  <path d="M 200,300 L 160,350" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arr-green)"/>
  <rect x="166" y="315" width="28" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="180" y="325" text-anchor="middle" class="edge">No</text>
  <rect x="290" y="350" width="220" height="70" rx="8" ry="8" fill="#052e16" stroke="#10b981" stroke-width="1.5"/>
  <text x="400" y="383" text-anchor="middle" class="label">Setup Assistant Failed</text>
  <text x="400" y="399" text-anchor="middle" class="sub">L1 RB 11  ·  MACR2</text>
  <path d="M 380,300 L 400,350" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arr-green)"/>
  <rect x="376" y="315" width="28" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="390" y="325" text-anchor="middle" class="edge">Yes</text>
  <path d="M 675,125 L 800,125 L 800,205" stroke="#3b82f6" stroke-width="1.5" fill="none" marker-end="url(#arr-blue)"/>
  <rect x="726" y="108" width="28" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="740" y="118" text-anchor="middle" class="edge">Yes</text>
  <rect x="620" y="210" width="360" height="100" rx="8" ry="8" fill="#1e1b4b" stroke="#a855f7" stroke-width="1.5"/>
  <text x="800" y="250" text-anchor="middle" class="label">What is the</text>
  <text x="800" y="266" text-anchor="middle" class="label">primary symptom?</text>
  <text x="800" y="282" text-anchor="middle" class="sub">MAC3 · 5 routes</text>
  <rect x="540" y="460" width="120" height="70" rx="8" ry="8" fill="#052e16" stroke="#10b981" stroke-width="1.5"/>
  <text x="600" y="493" text-anchor="middle" class="label">Profile Not Applied</text>
  <text x="600" y="509" text-anchor="middle" class="sub">L1 RB 12</text>
  <path d="M 755.0,310 L 600,460" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arr-green)"/>
  <rect x="559" y="370" width="43" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="580" y="380" text-anchor="middle" class="edge">profile</text>
  <rect x="670" y="460" width="120" height="70" rx="8" ry="8" fill="#052e16" stroke="#10b981" stroke-width="1.5"/>
  <text x="730" y="493" text-anchor="middle" class="label">App Not Installed</text>
  <text x="730" y="509" text-anchor="middle" class="sub">L1 RB 13</text>
  <path d="M 785.0,310 L 730,460" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arr-green)"/>
  <rect x="696" y="375" width="28" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="710" y="385" text-anchor="middle" class="edge">app</text>
  <rect x="800" y="460" width="120" height="70" rx="8" ry="8" fill="#052e16" stroke="#10b981" stroke-width="1.5"/>
  <text x="860" y="493" text-anchor="middle" class="label">Compliance / Access</text>
  <text x="860" y="509" text-anchor="middle" class="sub">L1 RB 14</text>
  <path d="M 815.0,310 L 860,460" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arr-green)"/>
  <rect x="811" y="380" width="58" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="840" y="390" text-anchor="middle" class="edge">compliance</text>
  <rect x="930" y="460" width="120" height="70" rx="8" ry="8" fill="#052e16" stroke="#10b981" stroke-width="1.5"/>
  <text x="990" y="493" text-anchor="middle" class="label">Company Portal Sign-In</text>
  <text x="990" y="509" text-anchor="middle" class="sub">L1 RB 15</text>
  <path d="M 845.0,310 L 990,460" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arr-green)"/>
  <rect x="944" y="385" width="53" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="970" y="395" text-anchor="middle" class="edge">CP signin</text>
  <rect x="60" y="460" width="220" height="70" rx="8" ry="8" fill="#450a0a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="170" y="493" text-anchor="middle" class="label">Escalate L2</text>
  <text x="170" y="509" text-anchor="middle" class="sub">Other / unclear  ·  MACE1</text>
  <path d="M 620,310 L 175,460" stroke="#ef4444" stroke-width="1.5" fill="none" marker-end="url(#arr-red)"/>
  <rect x="364" y="370" width="33" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="380" y="380" text-anchor="middle" class="edge">other</text>
  <rect x="30" y="815" width="14" height="14" rx="3" ry="3" fill="#eff6ff" stroke="#2563eb" stroke-width="1.2"/>
  <text x="52" y="826" class="legend">Decision</text>
  <rect x="118" y="815" width="14" height="14" rx="3" ry="3" fill="#faf5ff" stroke="#9333ea" stroke-width="1.2"/>
  <text x="140" y="826" class="legend">Symptom router</text>
  <rect x="242" y="815" width="14" height="14" rx="3" ry="3" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.2"/>
  <text x="264" y="826" class="legend">Resolved (L1 RB)</text>
  <rect x="378" y="815" width="14" height="14" rx="3" ry="3" fill="#fef2f2" stroke="#dc2626" stroke-width="1.2"/>
  <text x="400" y="826" class="legend">Escalate L2</text>
  <text x="1080" y="842" text-anchor="end" class="legend">docs/diagrams/decision-tree-06-macos-triage.svg</text>
</svg>
