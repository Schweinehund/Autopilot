  <rect x="526" y="182" width="28" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="540" y="192" text-anchor="middle" class="edge">No</text>
  <path d="M 810,180 L 810,200 L 960,200 L 960,230" stroke="#3b82f6" stroke-width="1.5" fill="none" marker-end="url(#arr-blue)"/>
  <rect x="736" y="182" width="28" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="750" y="192" text-anchor="middle" class="edge">Yes</text>
  <rect x="40" y="400" width="280" height="80" rx="8" ry="8" fill="#052e16" stroke="#10b981" stroke-width="1.5"/>
  <text x="180" y="438" text-anchor="middle" class="label">Device Not Appearing</text>
  <text x="180" y="454" text-anchor="middle" class="sub">L1 RB 10  ·  MACR1</text>
  <rect x="340" y="400" width="280" height="80" rx="8" ry="8" fill="#052e16" stroke="#10b981" stroke-width="1.5"/>
  <text x="480" y="438" text-anchor="middle" class="label">Setup Assistant Failed</text>
  <text x="480" y="454" text-anchor="middle" class="sub">L1 RB 11  ·  MACR2</text>
  <path d="M 250,330 L 180,400" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arr-green)"/>
  <rect x="151" y="378" width="28" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="165" y="388" text-anchor="middle" class="edge">No</text>
  <path d="M 390,330 L 480,400" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arr-green)"/>
  <rect x="501" y="378" width="28" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="515" y="388" text-anchor="middle" class="edge">Yes</text>
  <rect x="144" y="540" width="220" height="100" rx="8" ry="8" fill="#052e16" stroke="#10b981" stroke-width="1.5"/>
  <text x="254" y="588" text-anchor="middle" class="label">Profile Not Applied</text>
  <text x="254" y="604" text-anchor="middle" class="sub">L1 RB 12  ·  MACR3</text>
  <path d="M 1160,340 L 1160,370 L 254,370 L 254,540" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arr-green)"/>
  <rect x="233" y="352" width="43" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="254" y="362" text-anchor="middle" class="edge">profile</text>
  <rect x="392" y="540" width="220" height="100" rx="8" ry="8" fill="#052e16" stroke="#10b981" stroke-width="1.5"/>
  <text x="502" y="588" text-anchor="middle" class="label">App Not Installed</text>
  <text x="502" y="604" text-anchor="middle" class="sub">L1 RB 13  ·  MACR4</text>
  <path d="M 1160,340 L 1160,370 L 502,370 L 502,540" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arr-green)"/>
  <rect x="488" y="352" width="28" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="502" y="362" text-anchor="middle" class="edge">app</text>
  <rect x="640" y="540" width="220" height="100" rx="8" ry="8" fill="#052e16" stroke="#10b981" stroke-width="1.5"/>
  <text x="750" y="588" text-anchor="middle" class="label">Compliance / Access</text>
  <text x="750" y="604" text-anchor="middle" class="sub">L1 RB 14  ·  MACR5</text>
  <path d="M 1160,340 L 1160,370 L 750,370 L 750,540" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arr-green)"/>
  <rect x="721" y="352" width="58" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="750" y="362" text-anchor="middle" class="edge">compliance</text>
  <rect x="888" y="540" width="220" height="100" rx="8" ry="8" fill="#052e16" stroke="#10b981" stroke-width="1.5"/>
  <text x="998" y="588" text-anchor="middle" class="label">Company Portal Sign-In</text>
  <text x="998" y="604" text-anchor="middle" class="sub">L1 RB 15  ·  MACR6</text>
  <path d="M 1160,340 L 1160,370 L 998,370 L 998,540" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arr-green)"/>
  <rect x="972" y="352" width="53" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="998" y="362" text-anchor="middle" class="edge">CP signin</text>
  <rect x="1136" y="540" width="220" height="100" rx="8" ry="8" fill="#450a0a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="1246" y="588" text-anchor="middle" class="label">Other / Unclear</text>
  <text x="1246" y="604" text-anchor="middle" class="sub">MACE1</text>
  <path d="M 1160,340 L 1160,370 L 1246,370 L 1246,540" stroke="#ef4444" stroke-width="1.5" fill="none" marker-end="url(#arr-red)"/>
  <rect x="1230" y="352" width="33" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="1246" y="362" text-anchor="middle" class="edge">other</text>
  <rect x="30" y="865" width="14" height="14" rx="3" ry="3" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="52" y="876" class="legend">Decision</text>
  <rect x="118" y="865" width="14" height="14" rx="3" ry="3" fill="#1e1b4b" stroke="#a855f7" stroke-width="1.2"/>
  <text x="140" y="876" class="legend">Symptom router</text>
  <rect x="242" y="865" width="14" height="14" rx="3" ry="3" fill="#052e16" stroke="#10b981" stroke-width="1.2"/>
  <text x="264" y="876" class="legend">Resolved (L1 RB)</text>
  <rect x="378" y="865" width="14" height="14" rx="3" ry="3" fill="#450a0a" stroke="#ef4444" stroke-width="1.2"/>
  <text x="400" y="876" class="legend">Escalate L2</text>
  <text x="1480" y="892" text-anchor="end" class="legend">docs/diagrams/decision-tree-06-macos-triage.svg</text>
</svg>
