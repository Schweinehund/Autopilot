<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 920" width="1100" height="920">
  <style>
    text { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace; fill: #e2e8f0; letter-spacing: 0.02em; }
    .title { font-size: 18px; font-weight: 700; fill: #e2e8f0; letter-spacing: 0.02em; }
    .subtitle { font-size: 12px; fill: #94a3b8; }
    .label { font-size: 13px; fill: #e2e8f0; }
    .sub { font-size: 11px; fill: #94a3b8; }
    .edge { font-size: 11px; fill: #cbd5e1; font-weight: 700; }
    .col-head { font-size: 13px; font-weight: 700; fill: #cbd5e1; letter-spacing: 0.08em; }
    .legend { font-size: 11px; fill: #94a3b8; }
  </style>
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#3b82f6"/>
    </marker>
    <marker id="arr-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#ef4444"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#10b981"/>
    </marker>
    <marker id="arr-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#f97316"/>
    </marker>
    <marker id="arr-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#a855f7"/>
    </marker>
    <marker id="arr-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1100" height="920" fill="url(#bg-grad)"/>
  <text x="550" y="36" text-anchor="middle" class="title">Initial Triage Decision Tree</text>
  <text x="550" y="58" text-anchor="middle" class="subtitle">APv1 (classic Autopilot) — L1 symptom routing  ·  docs/decision-trees/00-initial-triage.md</text>
  <text x="550" y="92" text-anchor="middle" class="sub" font-weight="600" font-size="11" letter-spacing="0.08em" fill="#64748b">START</text>
  <polygon points="550,110 700,155 550,200 400,155" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="550" y="145" text-anchor="middle" class="label">Device reaches</text>
  <text x="550" y="161" text-anchor="middle" class="label">any website?</text>
  <text x="550" y="177" text-anchor="middle" class="sub">TRD1</text>
  <rect x="70" y="130" width="260" height="60" rx="8" ry="8" fill="#1c1917" stroke="#f97316" stroke-width="1.5"/>
  <text x="200" y="158" text-anchor="middle" class="label">Escalate: Infrastructure</text>
  <text x="200" y="174" text-anchor="middle" class="sub">No network connectivity  ·  TRE1</text>
  <path d="M 400,155 L 330,155" stroke="#f97316" stroke-width="1.5" fill="none" marker-end="url(#arr-orange)"/>
  <rect x="351" y="138" width="28" height="14" fill="#0f0f1a" opacity="0.95"/>
  <text x="365" y="148" text-anchor="middle" class="edge">No</text>
