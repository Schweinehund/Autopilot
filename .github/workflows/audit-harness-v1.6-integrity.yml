# v1.6 Audit Harness Integrity
# v1.6 integration surface. v1.4 + v1.4.1 + v1.5 harnesses frozen in their respective workflow files.
# New v1.6 checks (C14-C16) and per-phase validators (62-66) registered here.

name: Audit Harness v1.6 Integrity

on:
  pull_request:
    paths:
      - 'scripts/validation/v1.6-*'
      - 'docs/cross-platform/apple-business/**'
      - 'docs/l1-runbooks/34-apple-business-*.md'
      - 'docs/l2-runbooks/26-apple-business-*.md'
      - 'docs/admin-setup-ios/01-abm-configuration.md'
      - 'docs/admin-setup-ios/02-abm-token.md'
      - 'docs/admin-setup-macos/01-abm-configuration.md'
      - 'docs/admin-setup-macos/02-abm-token.md'
      - 'docs/reference/ios-capability-matrix.md'
      - 'docs/operations/00-index.md'
      - 'docs/common-issues.md'
      - 'docs/quick-ref-l1.md'
      - 'docs/quick-ref-l2.md'
      - 'docs/index.md'
      - '.github/workflows/audit-harness-v1.6-integrity.yml'
  schedule:
    - cron: '0 8 * * 1'         # Weekly bitrot catch: 08:00 UTC every Monday (Path-A from v1.5)
    - cron: '0 8 1 1,4,7,10 *'  # Quarterly c13_rotting_external check: 08:00 UTC on 1st of Jan/Apr/Jul/Oct (Phase 66 AUDIT-14)
  workflow_dispatch:

jobs:
  parse:
    name: Parse v1.6 sidecar JSON
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Validate v1.6-audit-allowlist.json
        run: |
          node -e "
            const fs = require('fs');
            const j = JSON.parse(fs.readFileSync('scripts/validation/v1.6-audit-allowlist.json', 'utf8'));
            if (!Array.isArray(j.supervision_exemptions) || j.supervision_exemptions.length === 0) {
              console.error('supervision_exemptions empty');
              process.exit(1);
            }
            console.log('v1.6 sidecar OK: ' + j.supervision_exemptions.length + ' supervision pins');
          "

  path-match:
    name: Harness references v1.6 sidecar
    runs-on: ubuntu-latest
    needs: parse
    steps:
      - uses: actions/checkout@v4
      - name: Verify harness sidecar reference
        run: |
          if grep -q "scripts/validation/v1.6-audit-allowlist.json" scripts/validation/v1.6-milestone-audit.mjs; then
            echo "OK: harness references v1.6 sidecar"
          else
            echo "FAIL: harness does not reference v1.6-audit-allowlist.json"
            exit 1
          fi

  harness-run:
    name: Run v1.6 milestone audit harness
    runs-on: ubuntu-latest
    needs: path-match
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Run v1.6-milestone-audit.mjs
        run: node scripts/validation/v1.6-milestone-audit.mjs --verbose

  check-phase-62:
    name: check-phase-62 validator
    runs-on: ubuntu-latest
    needs: harness-run
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Run check-phase-62.mjs
        run: |
          if [ -f scripts/validation/check-phase-62.mjs ]; then
            node scripts/validation/check-phase-62.mjs
          else
            echo "check-phase-62.mjs not present -- skipping (graceful degradation per Phase 42 D-31)"
          fi

  check-phase-63:
    name: check-phase-63 validator
    runs-on: ubuntu-latest
    needs: harness-run
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Run check-phase-63.mjs
        run: |
          if [ -f scripts/validation/check-phase-63.mjs ]; then
            node scripts/validation/check-phase-63.mjs
          else
            echo "check-phase-63.mjs not present -- skipping (graceful degradation per Phase 42 D-31)"
          fi

  check-phase-64:
    name: check-phase-64 validator
    runs-on: ubuntu-latest
    needs: harness-run
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Run check-phase-64.mjs
        run: |
          if [ -f scripts/validation/check-phase-64.mjs ]; then
            node scripts/validation/check-phase-64.mjs
          else
            echo "check-phase-64.mjs not present -- skipping (graceful degradation per Phase 42 D-31)"
          fi

  check-phase-65:
    name: check-phase-65 validator
    runs-on: ubuntu-latest
    needs: harness-run
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Run check-phase-65.mjs
        run: |
          if [ -f scripts/validation/check-phase-65.mjs ]; then
            node scripts/validation/check-phase-65.mjs
          else
            echo "check-phase-65.mjs not present -- skipping (graceful degradation per Phase 42 D-31)"
          fi

  check-phase-66:
    name: check-phase-66 validator
    runs-on: ubuntu-latest
    needs: harness-run
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Run check-phase-66.mjs
        run: |
          if [ -f scripts/validation/check-phase-66.mjs ]; then
            node scripts/validation/check-phase-66.mjs
          else
            echo "check-phase-66.mjs not present -- skipping (graceful degradation per Phase 42 D-31)"
          fi

  rotting-external-quarterly:
    name: Quarterly c13_rotting_external link-check
    runs-on: ubuntu-latest
    needs: harness-run
    if: github.event_name == 'schedule' && github.event.schedule == '0 8 1 1,4,7,10 *'
    # DEFAULT continue-on-error: false -- quarterly drift FAILS the scheduled run per D-A9 fully-blocking
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Install markdown-link-check
        run: npm install -g markdown-link-check@3.14.2  # Pinned via `npm view markdown-link-check version` at Phase 66 Wave 3 authoring (2026-05-25)
      - name: Extract URLs from c13_rotting_external
        run: |
          node -e "
            const fs = require('fs');
            const sidecar = JSON.parse(fs.readFileSync('scripts/validation/v1.6-audit-allowlist.json','utf8'));
            const c13 = sidecar.c13_rotting_external || {};
            const urls = [];
            if (Array.isArray(c13.ci_1_abm_urls)) urls.push(...c13.ci_1_abm_urls.map(e => e.url).filter(Boolean));
            // CI-2 + CI-3 entries do not carry URLs -- they are line-ref tracking only
            fs.writeFileSync('quarterly-urls.txt', urls.join('\n'));
            console.log('Quarterly URL check candidates: ' + urls.length);
          "
      - name: Run markdown-link-check
        run: |
          if [ -s quarterly-urls.txt ]; then
            while IFS= read -r url; do
              markdown-link-check <(echo "[link]($url)") || exit 1
            done < quarterly-urls.txt
          else
            echo "No URLs to check in c13_rotting_external (empty population -- DEFERRED-CLEANUP.md notes calibration finding)"
          fi

  pin-helper-advisory:
    name: Supervision-pin drift advisory (CI)
    runs-on: ubuntu-latest
    needs: harness-run
    continue-on-error: true   # Phase 43 D-14 / Phase 48 D-22: advisory only; never fails build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Run regenerate-supervision-pins.mjs --report
        run: |
          node scripts/validation/regenerate-supervision-pins.mjs --report || true
          echo "[advisory] CI advisory job; never blocks merge per Phase 43 D-14 + Phase 48 D-22"
      - name: Run --self-test (advisory only)
        run: |
          node scripts/validation/regenerate-supervision-pins.mjs --self-test || \
            echo "[advisory] --self-test failed; advisory only"
